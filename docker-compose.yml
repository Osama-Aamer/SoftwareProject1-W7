services:

  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: calculator_db
    ports:
      - "3308:3306"   # host port 3308 -> container port 3306 (avoids conflict with local MariaDB)
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mariadb", "-uroot", "-ppassword", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: calculator-app:latest
    container_name: calculator-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DISPLAY: host.docker.internal:0.0
    restart: on-failure

volumes:
  db_data:
